<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gigante News — Notificações</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #c8102e; font-size: 2rem; margin-bottom: 8px; }
    p  { color: #aaa; font-size: 1rem; max-width: 320px; }
    .badge {
      margin-top: 24px;
      background: #c8102e;
      padding: 10px 24px;
      border-radius: 24px;
      font-weight: bold;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>⚡ Gigante News</h1>
  <p>Ative as notificações para saber quando os rivais tropeçarem!</p>
  <div class="badge">🔔 Rivais no Radar</div>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "15a16701-970c-475c-8ac5-b5e39c432932",
        notifyButton: { enable: true },
        allowLocalhostAsSecureOrigin: false
      });
    });
  </script>

</body>
</html>
